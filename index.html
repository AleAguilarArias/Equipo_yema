<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipo Yemas - Psicología Comunitaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color amarillo ajustado para coincidir con el fondo de la imagen F5.jpg */
            --sidebar-bg: #FEF2B5; 
            --sidebar-text: #333333; 
            --text-main: #333333;
            --bg-main: #ffffff;
            --accent: #86C1B9; 
        }

        body {
            margin: 0;
            font-family: 'Open Sans', sans-serif;
            color: var(--text-main);
            display: flex;
            background-color: var(--bg-main);
            line-height: 1.6;
            /* Aseguramos que la página completa pueda hacer scroll horizontal si es necesario */
            overflow-x: hidden; 
        }

        /* --- Barra Lateral (Sidebar) --- */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg); 
            color: var(--sidebar-text);
            height: 100vh;
            position: fixed;
            padding: 40px 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            /* Agregamos scroll interno por si la pantalla es muy pequeña */
            overflow-y: auto; 
        }

        .sidebar-logo {
            width: 100%;
            max-width: 160px; 
            height: auto;
            margin: 0 auto 20px auto; 
            display: block;
            border-radius: 50%; /* Imagen circular */
        }

        .sidebar h1 {
            font-family: 'Merriweather', serif;
            margin-bottom: 10px;
            font-size: 2em;
            margin-top: 0; 
            text-align: center;
        }

        .sidebar p {
            font-size: 1.1em; 
            font-weight: 600;
            opacity: 0.9;
            margin-bottom: 40px;
            text-align: center;
            color: #111; 
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-links li {
            margin-bottom: 15px;
        }

        .nav-links a {
            color: rgba(51, 51, 51, 0.7); 
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            transition: color 0.3s ease;
            cursor: pointer;
            display: block;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #111111; 
        }

        .social-icons {
            margin-top: auto; /* Empuja los iconos hacia abajo */
            padding-top: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-bottom: 20px;
        }

        .social-icons span {
            display: inline-flex;
            width: 30px;
            height: 30px;
            background: rgba(51, 51, 51, 0.1); 
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .social-icons span:hover {
            background: rgba(51, 51, 51, 0.2);
        }

        /* --- Contenido Principal --- */
        .content {
            margin-left: 300px;
            padding: 60px 80px 100px 80px; /* Padding bottom para scrollear cómodamente */
            width: calc(100% - 300px);
            box-sizing: border-box;
            max-width: 1000px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .content-img {
            width: 100%;
            max-width: 700px;
            margin: 20px auto;
            border-radius: 8px;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .welcome-text {
            color: black;
            font-weight: bold;
            text-align: center;
            font-size: 1.3em;
            margin-top: 20px;
            font-family: 'Merriweather', serif;
        }

        .content h2 {
            font-family: 'Merriweather', serif;
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #222;
        }

        .date {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Acordeones (Figuras desplegables) --- */
        .accordion-btn {
            background-color: #f9f9f9;
            color: #333;
            cursor: pointer;
            padding: 18px;
            width: 100%;
            border: none;
            text-align: left;
            outline: none;
            font-size: 1.2em;
            font-weight: 600;
            font-family: 'Merriweather', serif;
            transition: 0.4s;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #F5D34C; /* Borde izquierdo resaltado */
            border-radius: 0 4px 4px 0;
        }

        .accordion-btn:hover, .accordion-btn.active-btn {
            background-color: #ececec;
        }

        .accordion-btn::after {
            content: '\002B';
            font-size: 1.5em;
            color: #777;
        }

        .accordion-btn.active-btn::after {
            content: "\2212";
        }
